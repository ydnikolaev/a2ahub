# Product-repo CI (spec 01-foundation.md §T5): runs `make check` — the
# gate the root Makefile already defines (gofmt/vet/test once go.mod
# exists, plus the pre-existing repo gates feature-lint/epic-drift). The
# only project-specific step is `make check` itself; the Makefile's steps
# are never reimplemented inline here.
#
# golangci-lint provisioning is a toolchain-setup step (like the Go setup
# above it), not a project step: ADR-002 lists golangci-lint as a tool
# that never enters go.mod (a binary the gate invokes), and the Makefile's
# `check` target intentionally fails loudly if .golangci.yml exists but
# the binary is missing — so CI must provision it or `make check` always
# reds once this phase lands.
name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.12.2/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: make check
        run: make check

  # skill-drift (spec 13 T4/T5, AC-602.1 machine clause): the generated half
  # of the a2ahub skill must stay byte-identical to a fresh regeneration from
  # the built binary. Prose paths (SKILL.md/loops.md/…) are OUT of this job —
  # they are release-checklist-gated (D-015), never machine-gated. The spec's
  # path-scoped trigger is intentionally widened to always-run (like `check`):
  # the regenerate is cheap and an always-green gate cannot silently skip.
  skill-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Regenerate skill reference from the binary and byte-diff
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          mkdir -p "$tmp/authoring"
          # commands.md == `a2a __catalog` (command + MCP-tool catalog).
          go run ./cmd/a2a __catalog > "$tmp/commands.md"
          diff -u skill/a2ahub/reference/commands.md "$tmp/commands.md"
          # authoring/<type>.md == `a2a template show <type>` (OP-219), one per type.
          for t in $(go run ./cmd/a2a template list); do
            go run ./cmd/a2a template show "$t" > "$tmp/authoring/$t.md"
          done
          for f in "$tmp"/authoring/*.md; do
            committed="skill/a2ahub/reference/authoring/$(basename "$f")"
            if [ ! -f "$committed" ]; then
              echo "skill-drift: new template type with no committed authoring file: $(basename "$f")" >&2
              exit 1
            fi
            diff -u "$committed" "$f"
          done
          # a committed authoring file whose type no longer exists is also drift.
          for f in skill/a2ahub/reference/authoring/*.md; do
            test -f "$tmp/authoring/$(basename "$f")" || {
              echo "skill-drift: committed authoring file with no live template type: $(basename "$f")" >&2
              exit 1
            }
          done
