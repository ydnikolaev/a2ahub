# Release (P16, §7.3 / D-013): on a `v*` tag, cross-build the single `a2a`
# binary for the first-class targets and publish a GitHub release whose asset
# names the space CI gate fetches VERBATIM (space-template's a2a-validate job
# does `gh release download --pattern 'a2a-linux-amd64'`). The asset naming
# `a2a-<os>-<arch>` is therefore a BEHAVIOR CONTRACT — do not rename without
# updating space-template/.github/workflows/a2a-validate.yml in lockstep.
#
# SIGNING: keyless cosign (Sigstore OIDC) — signs each asset using the GitHub
# Actions workflow identity, NO secrets/keys to manage. Signatures + certs are
# uploaded as `.cosign.bundle` assets and logged in the Rekor transparency log.
# This is supply-chain hygiene; it is NOT D-013's "public key pinned in the
# binary, verified by `a2a update`" model — that verifier (OP-217) does not
# exist in the binary yet, so pinned-key verification is a future phase (see
# docs/backlog.md). Signing is BEST-EFFORT here: if it fails on this (untested)
# pipeline, the release still ships, unsigned.
name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create the release + upload assets
  id-token: write # keyless cosign OIDC identity

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-build the first-class targets
        env:
          # Tag- and commit-controlled values via env (never interpolated
          # directly into the run script) — the ${{ }} → env → "$VAR" pattern.
          TAG: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Stamp the BARE dotted version (strip the tag's leading "v") so
          # main.version matches space.yaml's bare `min_binary_version`
          # exactly — the version parsers tolerate a "v", but a clean stamp
          # removes all doubt (mirrors the P10 doctor bare-version fix).
          VERSION="${TAG#v}"
          mkdir -p dist
          # darwin/arm64 + linux/amd64 first (§7.3); linux/arm64 + darwin/amd64
          # for completeness. CGO off → static, portable binaries.
          for t in linux/amd64 linux/arm64 darwin/arm64 darwin/amd64; do
            os="${t%/*}"; arch="${t#*/}"
            echo "building a2a-${os}-${arch} (version=${VERSION} commit=${COMMIT})"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -trimpath \
              -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}" \
              -o "dist/a2a-${os}-${arch}" ./cmd/a2a
          done
          (cd dist && sha256sum a2a-* > SHA256SUMS)
          ls -l dist

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign assets (keyless, best-effort)
        continue-on-error: true # an untested signer must never block the release
        run: |
          set -euo pipefail
          for f in dist/a2a-* dist/SHA256SUMS; do
            cosign sign-blob --yes "$f" --bundle "${f}.cosign.bundle"
          done
          echo "signed: $(ls dist/*.cosign.bundle 2>/dev/null | wc -l) asset(s)"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Upload every artifact present (binaries + SHA256SUMS + any
          # .cosign.bundle that the best-effort signer produced).
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            dist/*
