id: fb-20260703-3c4d5e
kind: feature
severity: minor
title: "no way to list only contracts my system consumes"
summary: >-
  `a2a list` prints every artifact in a space; there is no filter for "only
  the contracts my own system is a registered consumer of". I ended up
  grepping the full output and cross-referencing consumes.yaml by hand.
context:
  a2a_version: v0.1.1
  os_arch: darwin/arm64
  surface: cli
  command: a2a list
proposal: >-
  a2a list --consumed-by <system> filtering against consumes/v1's
  dependencies list, reusing the existing consumes schema loader.
