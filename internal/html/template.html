<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>a2a dashboard</title>
<style>
:root{
  --bg:#f5f6f9; --surface:#ffffff; --surface-2:#f1f3f7; --surface-3:#e8ecf2;
  --border:#e5e8ef; --border-strong:#d2d8e2; --hair:#eef1f5;
  --text:#141821; --text-dim:#586173; --text-faint:#8b95a5;
  --accent:#4b57d2; --accent-2:#5b6ef5; --accent-soft:#ecedfb; --accent-ring:#c9cdf7;
  --blocking:#d6453e; --blocking-soft:#fbe9e8; --blocking-line:#e0605a;
  --attention:#bd7d13; --attention-soft:#faf0dc; --attention-line:#d0972f;
  --ok:#2f9469; --ok-soft:#e6f3ed;
  --info:#2f76c9; --info-soft:#e7f0fb;
  --t-contract:#1f9b8a; --t-requirement:#bd7d13; --t-question:#2f76c9; --t-work:#7657ce;
  --t-decision:#c14f86; --t-handoff:#3f9d6e; --t-response:#2f9c93; --t-announcement:#7a8393;
  --d-current:#2f9469; --d-behind:#bd7d13; --d-deprecated:#c67434; --d-retired:#c0403a; --d-dangling:#c0403a;
  --shadow-sm:0 1px 2px rgba(20,28,44,.05);
  --shadow:0 1px 2px rgba(20,28,44,.04),0 6px 20px -6px rgba(20,28,44,.10);
  --mono:ui-monospace,"SF Mono",SFMono-Regular,"Cascadia Code","JetBrains Mono","Roboto Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Helvetica,Arial,sans-serif;
  --r:12px; --r-md:10px; --r-sm:8px; --topbar:60px;
}
@media (prefers-color-scheme:dark){ :root{ color-scheme:dark;
  --bg:#0c0f14; --surface:#141922; --surface-2:#1a212b; --surface-3:#232c38; --hair:#1c232d;
  --border:#252d39; --border-strong:#38424f; --text:#e8ecf3; --text-dim:#9aa5b5; --text-faint:#6a7585;
  --accent:#8b95f2; --accent-2:#9aa4ff; --accent-soft:#1e2440; --accent-ring:#39407a;
  --blocking:#f07873; --blocking-soft:#3a1e1d; --blocking-line:#c85752;
  --attention:#e0a94e; --attention-soft:#382b16; --attention-line:#b8862f;
  --ok:#5cbf90; --ok-soft:#16281f; --info:#5f9ee6; --info-soft:#152436;
  --t-contract:#3fbfab; --t-requirement:#e0a94e; --t-question:#5f9ee6; --t-work:#a189ea;
  --t-decision:#e07bad; --t-handoff:#5cbf90; --t-response:#3fbfb2; --t-announcement:#8b93a3;
  --d-current:#5cbf90; --d-behind:#e0a94e; --d-deprecated:#e0995f; --d-retired:#f07873; --d-dangling:#f07873;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px -8px rgba(0,0,0,.5);
}}
:root[data-theme="light"]{ color-scheme:light;
  --bg:#f5f6f9; --surface:#ffffff; --surface-2:#f1f3f7; --surface-3:#e8ecf2; --hair:#eef1f5;
  --border:#e5e8ef; --border-strong:#d2d8e2; --text:#141821; --text-dim:#586173; --text-faint:#8b95a5;
  --accent:#4b57d2; --accent-2:#5b6ef5; --accent-soft:#ecedfb; --accent-ring:#c9cdf7;
  --blocking:#d6453e; --blocking-soft:#fbe9e8; --blocking-line:#e0605a;
  --attention:#bd7d13; --attention-soft:#faf0dc; --attention-line:#d0972f;
  --ok:#2f9469; --ok-soft:#e6f3ed; --info:#2f76c9; --info-soft:#e7f0fb;
  --t-contract:#1f9b8a; --t-requirement:#bd7d13; --t-question:#2f76c9; --t-work:#7657ce;
  --t-decision:#c14f86; --t-handoff:#3f9d6e; --t-response:#2f9c93; --t-announcement:#7a8393;
  --d-current:#2f9469; --d-behind:#bd7d13; --d-deprecated:#c67434; --d-retired:#c0403a; --d-dangling:#c0403a;
  --shadow-sm:0 1px 2px rgba(20,28,44,.05);
  --shadow:0 1px 2px rgba(20,28,44,.04),0 6px 20px -6px rgba(20,28,44,.10);
}
:root[data-theme="dark"]{ color-scheme:dark;
  --bg:#0c0f14; --surface:#141922; --surface-2:#1a212b; --surface-3:#232c38; --hair:#1c232d;
  --border:#252d39; --border-strong:#38424f; --text:#e8ecf3; --text-dim:#9aa5b5; --text-faint:#6a7585;
  --accent:#8b95f2; --accent-2:#9aa4ff; --accent-soft:#1e2440; --accent-ring:#39407a;
  --blocking:#f07873; --blocking-soft:#3a1e1d; --blocking-line:#c85752;
  --attention:#e0a94e; --attention-soft:#382b16; --attention-line:#b8862f;
  --ok:#5cbf90; --ok-soft:#16281f; --info:#5f9ee6; --info-soft:#152436;
  --t-contract:#3fbfab; --t-requirement:#e0a94e; --t-question:#5f9ee6; --t-work:#a189ea;
  --t-decision:#e07bad; --t-handoff:#5cbf90; --t-response:#3fbfb2; --t-announcement:#8b93a3;
  --d-current:#5cbf90; --d-behind:#e0a94e; --d-deprecated:#e0995f; --d-retired:#f07873; --d-dangling:#f07873;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px -8px rgba(0,0,0,.5);
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline;color:var(--accent-2)}
.mono{font-family:var(--mono)}
button{font:inherit}
::selection{background:var(--accent-soft)}

/* ---------------------------------------------------------------- topbar */
.topbar{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--surface) 88%,transparent);
  backdrop-filter:saturate(1.4) blur(10px);border-bottom:1px solid var(--border);height:var(--topbar)}
.topbar-in{display:flex;align-items:center;gap:16px;height:100%;padding:0 22px}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.brand .mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(140deg,var(--accent-2),var(--accent));
  display:grid;place-items:center;color:#fff;font-weight:750;font-size:14px;flex:none;letter-spacing:-.03em}
.brand .who{display:flex;flex-direction:column;line-height:1.15;min-width:0}
.brand .who .n{font-weight:680;letter-spacing:-.01em}
.brand .who .s{font-family:var(--mono);font-size:11.5px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-spacer{flex:1}
.summary{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.chipstat{display:inline-flex;align-items:center;gap:7px;height:30px;padding:0 12px;border-radius:999px;
  border:1px solid var(--border);background:var(--surface-2);font-size:12.5px;color:var(--text-dim);white-space:nowrap;font-weight:550}
.chipstat b{color:var(--text);font-weight:700}
.chipstat .d{width:7px;height:7px;border-radius:50%;background:currentColor}
.chipstat.block{background:var(--blocking-soft);border-color:transparent;color:var(--blocking)} .chipstat.block b{color:var(--blocking)}
.chipstat.ok{background:var(--ok-soft);border-color:transparent;color:var(--ok)}
.chipstat.warn{background:var(--attention-soft);border-color:transparent;color:var(--attention)}
.tool{display:inline-flex;align-items:center;gap:7px;height:30px;padding:0 12px;border-radius:999px;
  font-family:var(--mono);font-size:12px;border:1px solid var(--border);color:var(--text-dim);background:var(--surface-2);cursor:default}
.tool.nudge{border-color:transparent;background:var(--attention-soft);color:var(--attention)}
.tool.req{border-color:transparent;background:var(--blocking-soft);color:var(--blocking);font-weight:700}
.ctlgroup{display:flex;align-items:center;gap:8px}
.seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:2px}
.seg button{appearance:none;border:none;background:none;cursor:pointer;color:var(--text-dim);
  padding:5px 11px;border-radius:7px;font-size:12.5px;font-weight:600}
.seg button.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm)}
.iconbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);
  color:var(--text-dim);cursor:pointer;display:grid;place-items:center}
.iconbtn:hover{color:var(--text);border-color:var(--border-strong)}
.iconbtn svg{width:16px;height:16px}

/* ---------------------------------------------------------------- shell */
.shell{display:grid;grid-template-columns:250px minmax(0,1fr)}
.sidebar{position:sticky;top:var(--topbar);height:calc(100vh - var(--topbar));overflow-y:auto;
  border-right:1px solid var(--border);padding:18px 14px;background:var(--surface);
  display:flex;flex-direction:column;gap:6px}
.side-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);
  font-weight:700;padding:12px 10px 6px}
.side-title:first-child{padding-top:0}
.nav{display:flex;flex-direction:column;gap:3px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;
  color:var(--text-dim);font-weight:560;border:1px solid transparent;text-align:left;background:none;width:100%}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--accent);border-color:transparent}
.nav-item .ni-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono);font-size:13px}
.nav-item .hdot{width:8px;height:8px;border-radius:50%;flex:none}
.hdot.fresh{background:var(--ok)} .hdot.stale{background:var(--attention)} .hdot.degraded{background:var(--blocking)}
.nav-item .cnt{font-size:11px;min-width:19px;height:19px;padding:0 5px;border-radius:999px;background:var(--blocking);
  color:#fff;display:inline-grid;place-items:center;font-weight:700;flex:none}
.nav-item svg{width:16px;height:16px;flex:none}
.side-div{height:1px;background:var(--border);margin:8px 6px}
.asof{margin-top:auto;padding:12px 10px 2px;font-family:var(--mono);font-size:10.5px;color:var(--text-faint);line-height:1.5}

.content{min-width:0;padding:26px 30px 70px}
.page-h{display:flex;align-items:flex-end;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.page-h h1{margin:0;font-size:21px;letter-spacing:-.02em;font-weight:720}
.page-h .subttl{color:var(--text-dim);font-size:13.5px;font-family:var(--mono)}
.page-h .ph-sp{flex:1}
.ph-left{display:flex;flex-direction:column;gap:11px;min-width:0}
.ph-meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.ph-repo{font-family:var(--mono);font-size:12px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px}
.ph-repo:hover{color:var(--accent)}
.ph-chip{display:inline-flex;align-items:center;gap:6px;height:27px;padding:0 11px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:12px;color:var(--text-dim);font-family:var(--mono)}
.ph-chip b{color:var(--text);font-weight:700} .ph-chip .k{color:var(--text-faint)}
.ph-chip .hd{width:8px;height:8px;border-radius:50%}
.ph-chip.fresh{color:var(--ok);border-color:transparent;background:var(--ok-soft)} .ph-chip.fresh .hd{background:var(--ok)}
.ph-chip.stale{color:var(--attention);border-color:transparent;background:var(--attention-soft)} .ph-chip.stale .hd{background:var(--attention)}
.ph-chip.degraded{color:var(--blocking);border-color:transparent;background:var(--blocking-soft)} .ph-chip.degraded .hd{background:var(--blocking)}

@media(max-width:980px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:static;height:auto;flex-direction:row;overflow-x:auto;border-right:none;
    border-bottom:1px solid var(--border);padding:10px 14px;gap:6px;align-items:center}
  .side-title,.side-div,.asof{display:none}
  .nav{flex-direction:row;gap:6px}
  .nav-item{width:auto;white-space:nowrap;padding:7px 12px}
  .nav-item .ni-name{max-width:130px}
  .content{padding:20px 16px 60px}
  .topbar-in{padding:0 14px;gap:10px}
  .brand .who .s{display:none}
}
@media(max-width:640px){ .summary .chipstat.spacecount,.tool{display:none} }

/* ---------------------------------------------------------------- cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.card + .card{margin-top:18px}
.card-h{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--hair)}
.card-h h2{margin:0;font-size:13.5px;font-weight:680;letter-spacing:-.005em}
.card-h .cnt-note{font-size:11.5px;color:var(--text-faint);font-family:var(--mono)}
.card-h .sp{flex:1}
.card-b{padding:15px 16px}
.grid2{display:grid;grid-template-columns:minmax(0,1.25fr) minmax(0,1fr);gap:18px;align-items:start;margin-top:18px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}

/* ---------------------------------------------------------------- graph */
.graphwrap{position:relative;background:radial-gradient(120% 100% at 50% 18%,var(--surface-2) 0%,var(--surface) 64%)}
.graph{display:block;width:100%;height:auto}
.g-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px 14px 2px}
.chk{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-dim);font-weight:560;
  background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:6px 13px;cursor:pointer;
  user-select:none;box-shadow:var(--shadow-sm)}
.chk input{accent-color:var(--accent);margin:0;width:14px;height:14px}
.g-hint{margin-left:auto;font-size:11.5px;color:var(--text-faint);background:var(--surface);border:1px solid var(--border);
  border-radius:999px;padding:6px 12px;box-shadow:var(--shadow-sm)}
.legend{display:flex;flex-wrap:wrap;gap:12px 20px;padding:13px 16px;border-top:1px solid var(--hair);font-size:12px;color:var(--text-dim)}
.legend .li{display:inline-flex;align-items:center;gap:8px}
.legend .ln{width:26px;height:0;border-top:2.5px solid var(--text-dim);border-radius:2px}
.legend .ln.dash{border-top-style:dashed}
.legend .ln.dot{border-top-style:dotted;border-top-width:3.5px;border-top-color:var(--text-faint)}
.legend .sw{width:12px;height:12px;border-radius:4px}
.graph text{pointer-events:none;user-select:none}
.edge,.node{cursor:help}
.graph .edge,.graph .node,.graph .cluster{transition:opacity .16s ease}
.graph.focus .edge,.graph.focus .node{opacity:.14}
.graph.focus .cluster{opacity:.45}
.graph.focus .edge.hl,.graph.focus .node.hl{opacity:1}
.graph .edge.x .ln{animation:gdash 1.4s linear infinite}
@keyframes gdash{to{stroke-dashoffset:-7}}
@media (prefers-reduced-motion:reduce){.graph .edge.x .ln{animation:none}}
.ginfo{width:32px;height:32px;border-radius:999px;border:1px solid var(--border);background:var(--surface);
  color:var(--text-faint);cursor:help;display:grid;place-items:center;box-shadow:var(--shadow-sm);padding:0}
.ginfo:hover{color:var(--text);border-color:var(--border-strong)}
.ginfo svg{width:15px;height:15px}
.tip{position:fixed;pointer-events:none;z-index:60;max-width:294px;min-width:212px;background:var(--surface);
  border:1px solid var(--border-strong);border-radius:12px;box-shadow:var(--shadow);padding:0;overflow:hidden;
  font-size:12.5px;color:var(--text);opacity:0;transform:translateY(5px);transition:opacity .11s,transform .11s}
.tip.on{opacity:1;transform:none}
.tip .t-acc{height:4px;width:100%}
.tip .t-body{padding:12px 14px}
.tip .t-h{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
.tip .t-h .t-title{font-weight:750;font-size:13.5px;letter-spacing:-.01em;word-break:break-word}
.tip .t-h .tag{font-family:var(--mono);font-size:10px;color:var(--text-faint);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.tip .t-sum{font-size:12.5px;font-weight:650;color:var(--text);margin:6px 0 9px;line-height:1.4}
.tip .t-kv{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:12px;align-items:baseline}
.tip .t-kv .k{color:var(--text-faint)}
.tip .t-kv .v{color:var(--text);text-align:right;display:inline-flex;align-items:center;gap:6px;justify-content:flex-end;word-break:break-word}
.tip .t-kv .v.mono{font-family:var(--mono);font-size:11px}
.tip .vdot{width:8px;height:8px;border-radius:50%;flex:none}
.tip .t-chips{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-top:9px}
.tip .t-chips .cl{font-size:11px;color:var(--text-faint);margin-right:2px}
.tip .t-chips .tchip{font-family:var(--mono);font-size:10.5px;padding:2px 7px;border-radius:6px;background:var(--surface-2);color:var(--text-dim)}
.tip .t-foot{margin-top:10px;padding-top:9px;border-top:1px solid var(--hair);font-size:11.5px;color:var(--text-dim);line-height:1.45}

/* ---------------------------------------------------------------- type badge */
.tbadge{display:inline-flex;align-items:center;gap:0;border-radius:7px;overflow:hidden;font-size:11.5px;
  border:1px solid var(--border);flex:none;line-height:1;height:22px;cursor:help}
.tbadge .px{font-family:var(--mono);font-size:10px;font-weight:700;color:#fff;padding:0 6px;height:100%;display:grid;place-items:center;letter-spacing:.02em}
.tbadge .wd{padding:0 8px;font-weight:600;color:var(--text);background:var(--surface);height:100%;display:grid;place-items:center;white-space:nowrap}

/* ---------------------------------------------------------------- inbox */
.filterbar{display:flex;flex-direction:column;gap:9px;padding:11px 16px;border-bottom:1px solid var(--hair)}
.filterrow{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:150px;display:flex;align-items:center;gap:8px;background:var(--surface-2);
  border:1px solid var(--border);border-radius:8px;padding:7px 11px}
.search input{border:none;background:none;outline:none;color:var(--text);font:inherit;font-size:13px;width:100%}
.search svg{width:15px;height:15px;color:var(--text-faint);flex:none}
.fchip{appearance:none;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);
  border-radius:999px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.fchip .fdot{width:8px;height:8px;border-radius:3px}
.fchip:hover{border-color:var(--border-strong);color:var(--text)}
.fchip.on{background:var(--accent-soft);color:var(--accent);border-color:transparent}
.panelscroll{max-height:560px;overflow-y:auto;scrollbar-width:thin}
.grp-h{position:sticky;top:0;z-index:2;display:flex;align-items:center;gap:8px;padding:9px 16px;
  font-size:11px;text-transform:uppercase;letter-spacing:.07em;font-weight:750;border-bottom:1px solid var(--border)}
.grp-h .gdot{width:8px;height:8px;border-radius:50%}
.grp-h .gc{margin-left:auto;font-weight:700;opacity:.75}
.grp-h.blocking{background:var(--blocking-soft);color:var(--blocking)} .grp-h.blocking .gdot{background:var(--blocking)}
.grp-h.attention{background:var(--attention-soft);color:var(--attention)} .grp-h.attention .gdot{background:var(--attention)}
.grp-h.normal{background:var(--surface-2);color:var(--text-dim)} .grp-h.normal .gdot{background:var(--border-strong)}
.grp + .grp{border-top:1px solid var(--border)}
.ibx-row{border-bottom:1px solid var(--hair)}
.ibx-row:last-child{border-bottom:none}
.ibx-main{display:grid;grid-template-columns:12px 128px minmax(0,1fr) auto;gap:10px;align-items:center;padding:11px 16px;cursor:pointer}
.ibx-main:hover{background:var(--surface-2)}
.ibx-row.blk .ibx-main{background:linear-gradient(90deg,var(--blocking-soft),transparent 60%)}
.ibx-row.blk .ibx-main:hover{background:linear-gradient(90deg,var(--blocking-soft),var(--surface-2) 62%)}
.sdot{width:9px;height:9px;border-radius:50%;flex:none}
.sdot.blocking{background:var(--blocking);box-shadow:0 0 0 3px var(--blocking-soft)}
.sdot.attention{background:var(--attention)} .sdot.normal{background:var(--border-strong)}
.tcell{min-width:0;overflow:hidden;display:flex}
.tcell .tbadge{max-width:128px}
.tcell .tbadge .wd{display:block;padding:0 8px;line-height:20px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ititle{font-weight:450;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.iright{display:grid;grid-template-columns:34px 14px 16px;gap:6px;align-items:center;flex:none}
.pslot{display:flex;justify-content:flex-end}
.nslot{display:flex;justify-content:center}
.newdot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.chev{color:var(--text-faint);transition:transform .15s;justify-self:center}
.chev.up{transform:rotate(180deg)}

/* ---------------------------------------------------------------- empty / degraded / setup */

  background:linear-gradient(90deg,var(--accent-ring),var(--accent) 55%,var(--ok))}
@media(max-width:960px){.g-rail{grid-template-columns:repeat(4,1fr)}.g-rail::before{display:none}}
@media(max-width:540px){.g-rail{grid-template-columns:repeat(2,1fr)}}

.docs-toc{position:sticky;top:calc(var(--topbar) + 20px);align-self:start;display:flex;flex-direction:column;gap:3px;max-height:calc(100vh - var(--topbar) - 56px);overflow-y:auto}
.docs-toc .toc-h{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--text-faint);font-weight:750;margin-bottom:6px}

.toc-link:hover{color:var(--accent)}
.toc-link.lvl-h3{padding-left:12px;font-size:11.5px;color:var(--text-faint)}
.doc-article{font-size:14px;line-height:1.65;color:var(--text)}
.doc-article h2{font-size:20px;font-weight:730;letter-spacing:-.02em;margin:26px 0 12px}
.doc-article h2:first-child{margin-top:18px}
.doc-article h3{font-size:15px;font-weight:700;margin:22px 0 8px}
.doc-article p{margin:0 0 12px;color:var(--text-dim)}
.doc-article ul,.doc-article ol{margin:0 0 14px;padding-left:20px;color:var(--text-dim)}
.doc-article li{margin:4px 0}
.doc-article li b,.doc-article p b{color:var(--text);font-weight:650}
.doc-article code{font-family:var(--mono);font-size:12.5px;background:var(--surface-2);border:1px solid var(--border);border-radius:5px;padding:1px 5px;color:var(--text)}
.doc-article a{color:var(--accent)}
.doc-article pre{position:relative;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;overflow-x:auto;margin:0 0 16px}
.doc-article pre code{background:none;border:none;padding:0;font-size:12.5px;line-height:1.6;color:var(--text);white-space:pre}
.doc-article table{width:100%;border-collapse:collapse;font-size:13px;margin:0 0 16px}
.doc-article th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-faint);font-weight:700;padding:8px 12px;border-bottom:1px solid var(--border)}
.doc-article td{padding:9px 12px;border-top:1px solid var(--hair);color:var(--text-dim);vertical-align:top}
.doc-article td code{white-space:nowrap}
.copybtn{position:absolute;top:8px;right:8px;appearance:none;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font:inherit;font-size:11px;font-weight:600;padding:3px 9px;border-radius:7px;cursor:pointer}

}

const DOCS = /*A2A_DOCS_START*/[
  { "id":"getting-started", "group":"Start", "title":"Getting started",
    "html":"<h2 id=install>Install &amp; connect</h2><p>Install the <code>a2a</code> binary, then connect this system to a space. Everything the dashboard shows is produced by these commands.</p><pre><code>$ brew install a2a         # or: go install ./cmd/a2a\n$ a2a init                 # scaffold .a2a/config.yaml\n$ a2a doctor               # verify tooling + space access</code></pre><h3 id=first-sync>Your first sync</h3><p>After <code>a2a init</code>, run a sync to pull the shared mirror of each space you belong to:</p><pre><code>$ a2a sync</code></pre><p>Re-run <code>a2a dashboard</code> at any point to regenerate this static page from the current mirror.</p>" },
  { "id":"work-loops", "group":"Concepts", "title":"The work loops",
    "html":"<h2 id=loops>The work loops</h2><p>Day-to-day work is a small set of repeatable loops. Each maps to a phase of an exchange.</p><h3 id=session-start>Session start</h3><p>Open the dashboard, scan the global header for blocking items, then triage your inbox top to bottom.</p><h3 id=send>Send loop</h3><p><code>a2a new</code> &rarr; <code>a2a validate</code> &rarr; <code>a2a submit</code>. The item appears in the recipient&rsquo;s inbox once the PR merges.</p><h3 id=receive>Receive loop</h3><p>Acknowledge, accept, work, then attach a response. The requester verifies and closes.</p><h3 id=contract-owner>Contract-owner loop</h3><p>When you provide a contract, watch its consumers and announce deprecations with a sunset date.</p><h3 id=escalation>Escalation</h3><p>If a thread stalls or is disputed, open a decision (XD) to get the required parties to agree.</p>" },
  { "id":"commands", "group":"Reference", "title":"Command reference",
    "html":"<h2 id=commands>Command reference</h2><p>Generated from the binary&rsquo;s help output.</p><table><thead><tr><th>Command</th><th>What it does</th></tr></thead><tbody><tr><td><code>a2a init</code></td><td>Scaffold local config for this system.</td></tr><tr><td><code>a2a doctor</code></td><td>Check tooling version, floors, and space access.</td></tr><tr><td><code>a2a sync</code></td><td>Pull the latest mirror of every connected space.</td></tr><tr><td><code>a2a new &lt;type&gt;</code></td><td>Draft a new artifact from the template.</td></tr><tr><td><code>a2a validate</code></td><td>Check schema + rules before submitting.</td></tr><tr><td><code>a2a submit</code></td><td>Open a PR to the space.</td></tr><tr><td><code>a2a dashboard</code></td><td>Regenerate this static dashboard.</td></tr></tbody></table><h3 id=mcp>MCP tools</h3><p>The same actions are exposed as MCP tools (<code>a2a.new</code>, <code>a2a.submit</code>, &hellip;) for agent use.</p>" },
  { "id":"authoring-contract", "group":"Authoring", "title":"Authoring: Contract",
    "html":"<h2 id=xc>Contract (XC)</h2><p>An interface you promise to provide. Version it; consumers pin a major.</p><pre><code>type: contract\nid: XC-&lt;system&gt;-&lt;name&gt;-v&lt;major&gt;\nversion: 1.0.0\nstate: published\ncode_backed: true</code></pre><ul><li><b>version</b> &mdash; semver; bump the major for breaking changes.</li><li><b>state</b> &mdash; published &rarr; deprecated (+sunset) &rarr; retired.</li><li><b>code_backed</b> &mdash; whether an implementation exists behind the spec.</li></ul>" },
  { "id":"authoring-question", "group":"Authoring", "title":"Authoring: Question",
    "html":"<h2 id=xq>Question (XQ)</h2><p>A question needing an answer. Mark <code>blocking:true</code> only when you truly cannot proceed.</p><pre><code>type: question\nto: [seomatrix]\npriority: p1\nblocking: true\ntitle: Ingest schema field `locale` &mdash; required?</code></pre>" },
  { "id":"authoring-work_request", "group":"Authoring", "title":"Authoring: Work request",
    "html":"<h2 id=xw>Work request (XW)</h2><p>Ask another team to do work. Be explicit about acceptance criteria.</p><pre><code>type: work_request\nto: [crawler]\ntitle: Provide sitemap delta feed\nacceptance: [\"delta endpoint\", \"backfill 30d\"]</code></pre>" },
  { "id":"troubleshooting", "group":"Help", "title":"Troubleshooting",
    "html":"<h2 id=doctor>a2a doctor checks</h2><p>Each check is PASS / WARN / FAIL. A FAIL blocks writes to the affected space.</p><ul><li><b>tooling floor</b> &mdash; your binary is below a space&rsquo;s minimum. Update to write.</li><li><b>mirror readable</b> &mdash; the local space mirror is malformed. Run <code>a2a sync</code>.</li><li><b>dangling deps</b> &mdash; you depend on a provider that left the space.</li></ul><h3 id=faq>Common fixes</h3><p>Most issues clear after <code>a2a sync</code> followed by <code>a2a doctor</code>.</p>" }
]/*A2A_DOCS_END*/;
</script>

<script>

/* ---------- state ---------- */
const S = {

let L = I18N[S.lang];

/* ---------- safe DOM helpers ---------- */
function el(tag, attrs, kids){
  const n=document.createElement(tag);
  if(attrs) for(const k in attrs){
    const v=attrs[k]; if(v==null) continue;
    if(k==="class") n.className=v;
    else if(k==="text") n.textContent=v;
    else if(k.startsWith("on")&&typeof v==="function") n.addEventListener(k.slice(2),v);
    else n.setAttribute(k,v);
  }
  if(kids!=null)(Array.isArray(kids)?kids:[kids]).forEach(c=>{ if(c==null)return;
    n.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return n;
}
const NS="http://www.w3.org/2000/svg";
function svg(tag,attrs){ const n=document.createElementNS(NS,tag);
  if(attrs) for(const k in attrs) if(attrs[k]!=null) n.setAttribute(k,attrs[k]); return n; }
function safeTitle(s){ if(s==null) return "(untitled)";
  const t=String(s).replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/g,"");
  return t.trim()===""?"(untitled)":t; }
function trunc(s,n){ s=String(s); return s.length>n?s.slice(0,n-1)+"…":s; }

/* ---------- meta lookups ---------- */
const TYPE_PX={contract:"XC",requirement:"XR",question:"XQ",work_request:"XW",decision:"XD",handoff:"XH",response:"XS",announcement:"XA"};
const TYPE_COLOR={contract:"var(--t-contract)",requirement:"var(--t-requirement)",question:"var(--t-question)",work_request:"var(--t-work)",decision:"var(--t-decision)",handoff:"var(--t-handoff)",response:"var(--t-response)",announcement:"var(--t-announcement)"};
function typeWord(t){ return (L.types[t])||t; }
function stateWord(s){ return s==null?"—":((L.states[s])||s); }
function sevWord(s){ return (L.sev[s])||s; }
function driftWord(d){ return (L.drift[d])||d; }
const DRIFT_COLOR={current:"var(--d-current)",behind:"var(--d-behind)",deprecated:"var(--d-deprecated)",retired:"var(--d-retired)",dangling:"var(--d-dangling)"};

/* deterministic org / space color */
const HUE={};
function hueOf(k){ if(!(k in HUE)){ let h=0; k=String(k); for(let i=0;i<k.length;i++)h=(h*31+k.charCodeAt(i))>>>0; HUE[k]=h%360;} return HUE[k]; }
function orgColor(o){ return "oklch(0.60 0.13 "+hueOf("org:"+(o||"?"))+")"; }
function orgSoft(o){ return "oklch(0.60 0.13 "+hueOf("org:"+(o||"?"))+" / 0.14)"; }
function spaceColor(s){ return "oklch(0.58 0.14 "+hueOf("space:"+s)+")"; }

  return b;
}

/* ================================================================ TOOLTIP */
function bindTip(node,data){
  node.addEventListener("mousemove",e=>showTip(e,data));
  node.addEventListener("mouseenter",e=>showTip(e,data));
  node.addEventListener("mouseleave",hideTip);
}
function showTip(e,data){
  const tip=document.getElementById("tip"); tip.textContent="";
  tip.appendChild(el("div",{class:"t-acc",style:"background:"+(data.accent||"var(--accent)")}));
  const body=el("div",{class:"t-body"});
  const h=el("div",{class:"t-h"},[el("span",{class:"t-title",text:data.title||data.head})]);
  if(data.tag) h.appendChild(el("span",{class:"tag",text:data.tag}));
  body.appendChild(h);
  if(data.summary) body.appendChild(el("div",{class:"t-sum",style:data.summaryColor?("color:"+data.summaryColor):null,text:data.summary}));
  const rows=(data.kv||data.rows||[]).filter(Boolean);
  if(rows.length){ const kv=el("div",{class:"t-kv"});
    rows.forEach(([k,v,o])=>{ kv.appendChild(el("span",{class:"k",text:k}));
      const vv=el("span",{class:"v"+((o&&o.mono)?" mono":"")});
      if(o&&o.dot) vv.appendChild(el("span",{class:"vdot",style:"background:"+(o.color||"var(--text-faint)")}));
      vv.appendChild(document.createTextNode(String(v))); kv.appendChild(vv); });
    body.appendChild(kv); }
  if(data.chips&&data.chips.length){ const c=el("div",{class:"t-chips"});
    if(data.chipsLabel) c.appendChild(el("span",{class:"cl",text:data.chipsLabel}));
    data.chips.forEach(x=>c.appendChild(el("span",{class:"tchip",text:x}))); body.appendChild(c); }
  if(data.footer) body.appendChild(el("div",{class:"t-foot",text:data.footer}));
  tip.appendChild(body);
  tip.classList.add("on");
  { const r=tip.getBoundingClientRect(); const pad=14;
    let x=e.clientX+pad, y=e.clientY+pad;
    if(x+r.width>innerWidth-8) x=e.clientX-r.width-pad;
    if(y+r.height>innerHeight-8) y=e.clientY-r.height-pad;
    tip.style.left=Math.max(8,x)+"px"; tip.style.top=Math.max(8,y)+"px"; }
}
function hideTip(){ document.getElementById("tip").classList.remove("on"); }

  const s=document.getElementById("summary"); s.textContent="";
  const spaces=DATA.spaces||[];

  if(blk>0) s.appendChild(el("span",{class:"chipstat block"},[el("span",{class:"d"}),el("b",{text:String(blk)}),document.createTextNode(L.ui.blocking)]));

}

/* ================================================================ GRAPH
   Hub layout: YOU pinned on the left, every space is a stacked panel on the
   right, systems are rows inside their panel. YOU<->system edges are curves
   with dedicated ports (sorted by target: no crossings). Peer-to-peer edges
   are orthogonal rails in the panel's right gutter — one slim lane per edge,
   so any number stays readable. Solid = contract (gray when current, colored
   only when drifted); dotted beads = open exchanges with a count pill. */
const GG={W:1080,egoX:44,egoW:216,panX:468,panGap:26,padX:16,headH:44,nodeH:48,rowGap:12,botPad:16,topPad:26};

function graphCard(ctx,nodes,cEdges,xEdges){
  const card=el("div",{class:"card"});
  const combined=ctx.mode!=="space";
  card.appendChild(el("div",{class:"card-h"},[
    el("h2",{text:L.ui.graph}),
    el("span",{class:"cnt-note",text:nodes.length+" "+(S.lang==="ru"?"систем":(nodes.length===1?"system":"systems"))}),
    el("span",{class:"sp"})]));
  const gw=el("div",{class:"graphwrap"});

  const ego=nodes.find(n=>n.self);
  const egoId=ego?ego.system:DATA.self;
  const known=new Set(nodes.map(n=>n.system));
  const E=[];
  (cEdges||[]).forEach(e=>{ if(known.has(e.from)&&known.has(e.to)) E.push({kind:"c",e,from:e.from,to:e.to}); });
  (xEdges||[]).forEach(e=>{ if(known.has(e.from)&&known.has(e.to)) E.push({kind:"x",e,from:e.from,to:e.to}); });
  const loops=E.filter(r=>r.from===r.to);
  const egoRel=E.filter(r=>r.from!==r.to&&(r.from===egoId||r.to===egoId));
  const third=E.filter(r=>r.from!==r.to&&r.from!==egoId&&r.to!==egoId);

  /* ---- panels ---- */
  const spaceList=combined?(ctx.allSpaces||ctx.spaces):ctx.spaces;
  const others=nodes.filter(n=>!n.self);
  const assigned=new Set();
  const panels=spaceList.map(sp=>{
    if(sp.readable===false) return {sp,mem:[],locked:true};
    const mem=others.filter(n=>(n.spaces||[]).includes(sp.id)&&!assigned.has(n.system));
    mem.forEach(m=>assigned.add(m.system));
    return {sp,mem,locked:false};
  });
  const panelOf={}; panels.forEach((p,i)=>p.mem.forEach(m=>panelOf[m.system]=i));
  const railsPer=panels.map((p,i)=>third.filter(r=>panelOf[r.from]===i).length);
  const panW=GG.W-GG.panX-34;
  const pos={};
  let yy=GG.topPad;
  panels.forEach((p,i)=>{
    p.x=GG.panX; p.y=yy; p.w=panW;
    if(p.locked){ p.h=88; }
    else{
      const gutter=railsPer[i]?(26+railsPer[i]*12):0;
      const nodeW=panW-GG.padX*2-gutter;
      p.mem.forEach((n,j)=>{ pos[n.system]={x:p.x+GG.padX,y:p.y+GG.headH+10+j*(GG.nodeH+GG.rowGap),w:nodeW,h:GG.nodeH}; });
      p.h=GG.headH+10+(p.mem.length?p.mem.length*(GG.nodeH+GG.rowGap)-GG.rowGap:44)+GG.botPad;
    }
    yy+=p.h+GG.panGap;
  });
  let H=yy-GG.panGap+GG.topPad;
  const rel=egoRel.filter(r=>pos[r.from===egoId?r.to:r.from]);
  const nEgo=rel.length;
  const hasEgoLoop=loops.some(r=>r.from===egoId);
  const egoH=Math.max(100,60+nEgo*16);
  if(H<egoH+(hasEgoLoop?160:72)) H=egoH+(hasEgoLoop?160:72);
  const egoY=Math.max(hasEgoLoop?70:20,(H-egoH)/2);
  if(ego) pos[egoId]={x:GG.egoX,y:egoY,w:GG.egoW,h:egoH,ego:true};

  /* ---- ports (sorted by target row: no crossings) ---- */
  const egoRight=GG.egoX+GG.egoW;
  rel.forEach(r=>{ r.other=(r.from===egoId?r.to:r.from); r.out=(r.from===egoId); });
  rel.sort((a,b)=>{ const pa=pos[a.other],pb=pos[b.other];
    if(pa.y!==pb.y) return pa.y-pb.y;
    if(a.kind!==b.kind) return a.kind==="c"?-1:1; return 0; });
  const pTop=egoY+26,pBot=egoY+egoH-26;
  rel.forEach((r,i)=>{ r.portY=(nEgo>1)?(pTop+i*(pBot-pTop)/(nEgo-1)):(egoY+egoH/2); });
  const byNode={};
  rel.forEach(r=>{ (byNode[r.other]=byNode[r.other]||[]).push(r); });
  Object.keys(byNode).forEach(sys=>{ const list=byNode[sys]; list.sort((a,b)=>a.portY-b.portY);
    const p=pos[sys], step=Math.min(14,(p.h-10)/list.length);
    list.forEach((r,i)=>{ r.slotY=p.y+p.h/2+(i-(list.length-1)/2)*step; }); });

  /* ---- peer rails: slot ys + lane per edge (short spans inner) ---- */
  const thirdOk=third.filter(r=>pos[r.from]&&pos[r.to]);
  const byR={};
  thirdOk.forEach(r=>{ (byR[r.from]=byR[r.from]||[]).push([r,"s"]); (byR[r.to]=byR[r.to]||[]).push([r,"t"]); });
  Object.keys(byR).forEach(sys=>{ const list=byR[sys], p=pos[sys];
    list.sort((a,b)=>{ const ya=pos[a[0].from===sys?a[0].to:a[0].from].y, yb=pos[b[0].from===sys?b[0].to:b[0].from].y; return ya-yb; });
    const step=Math.min(14,(p.h-10)/list.length);
    list.forEach((pair,i)=>{ const off=p.y+p.h/2+(i-(list.length-1)/2)*step;
      if(pair[1]==="s") pair[0].srcY=off; else pair[0].dstY=off; }); });
  const railGroups={};
  thirdOk.forEach(r=>{ const pi=(panelOf[r.from]!=null)?panelOf[r.from]:panelOf[r.to]; (railGroups[pi]=railGroups[pi]||[]).push(r); });
  Object.keys(railGroups).forEach(pi=>{ const list=railGroups[pi];
    list.sort((a,b)=>Math.abs(a.srcY-a.dstY)-Math.abs(b.srcY-b.dstY));
    list.forEach((r,i)=>{ r.lane=i; }); });

  /* ---- svg scaffold ---- */
  const s=svg("svg",{class:"graph",viewBox:"0 0 "+GG.W+" "+H,preserveAspectRatio:"xMidYMid meet",role:"img"});
  const defs=svg("defs"); defs.appendChild(arrowMarker());
  const filt=svg("filter",{id:"nshadow",x:"-30%",y:"-60%",width:"160%",height:"220%"});
  filt.appendChild(svg("feDropShadow",{dx:"0",dy:"1.5",stdDeviation:"2.4","flood-color":"#0b1220","flood-opacity":"0.09"}));
  defs.appendChild(filt); s.appendChild(defs);
  const gPan=svg("g"),gC=svg("g"),gX=svg("g"),gN=svg("g");
  const edgeGs=[],nodeGs=[];
  const adj={};
  E.forEach(r=>{ (adj[r.from]=adj[r.from]||new Set()).add(r.to); (adj[r.to]=adj[r.to]||new Set()).add(r.from); });

  function clearFocus(){ s.classList.remove("focus"); edgeGs.forEach(g=>g.classList.remove("hl")); nodeGs.forEach(g=>g.classList.remove("hl")); }
  function focusEdge(g){ s.classList.add("focus");
    edgeGs.forEach(x2=>x2.classList.toggle("hl",x2===g));
    nodeGs.forEach(n=>{ const ns2=n.getAttribute("data-sys");
      n.classList.toggle("hl",ns2===g.getAttribute("data-a")||ns2===g.getAttribute("data-b")); }); }
  function focusNode(sys){ s.classList.add("focus");
    edgeGs.forEach(g2=>g2.classList.toggle("hl",g2.getAttribute("data-a")===sys||g2.getAttribute("data-b")===sys));
    nodeGs.forEach(n=>{ const ns2=n.getAttribute("data-sys");
      n.classList.toggle("hl",ns2===sys||!!(adj[sys]&&adj[sys].has(ns2))); }); }

  /* ---- geometry ---- */
  function cpt(P,t){ const u=1-t;
    return {x:u*u*u*P[0][0]+3*u*u*t*P[1][0]+3*u*t*t*P[2][0]+t*t*t*P[3][0],
            y:u*u*u*P[0][1]+3*u*u*t*P[1][1]+3*u*t*t*P[2][1]+t*t*t*P[3][1]}; }
  function toPath(P){ return "M"+P[0][0]+" "+P[0][1]+" C "+P[1][0]+" "+P[1][1]+", "+P[2][0]+" "+P[2][1]+", "+P[3][0]+" "+P[3][1]; }
  function hGeo(sx,sy,sd,tx,ty,td){ const c=Math.max(44,Math.abs(tx-sx)*0.44);
    const ex=tx+td*7;
    const P=[[sx,sy],[sx+sd*c,sy],[ex+td*c,ty],[ex,ty]];
    return {d:toPath(P),mid:cpt(P,0.5)}; }
  function railGeo(r){
    const pa=pos[r.from],pb=pos[r.to];
    const sx=pa.x+pa.w, sy=r.srcY, ty=r.dstY, ex=pb.x+pb.w+6;
    const lx=pa.x+pa.w+22+r.lane*12;
    const dir=ty>sy?1:-1, rr=Math.min(9,Math.max(2,Math.abs(ty-sy)/2-2));
    const d="M"+(sx+1)+" "+sy+" L "+(lx-rr)+" "+sy+
      " Q "+lx+" "+sy+" "+lx+" "+(sy+dir*rr)+
      " L "+lx+" "+(ty-dir*rr)+
      " Q "+lx+" "+ty+" "+(lx-rr)+" "+ty+
      " L "+ex+" "+ty;
    return {d,mid:{x:lx,y:(sy+ty)/2},dot:{x:sx+2.5,y:sy}};
  }

  function edgeStyle(r){
    if(r.kind==="c"){ const d=r.e.drift||"current";
      if(d==="current") return {col:"var(--text-faint)",w:1.8,dash:null,cls:"c",op:"0.55"};
      return {col:DRIFT_COLOR[d]||"var(--text-faint)",w:2,dash:(d==="dangling"||d==="retired")?"4 5":null,cls:"c"}; }
    const blk=(r.e.blocking||r.e.maxPriority==="p1");
    return {col:blk?"var(--blocking)":"var(--text-faint)",w:Math.min(2.2+(r.e.count||1)*0.25,3.2),dash:"0.1 6.9",cls:"x",op:blk?null:"0.9"}; }

  function buildEdge(r,geo){
    const st=edgeStyle(r);
    const g=svg("g",{class:"edge "+st.cls,"data-a":r.from,"data-b":r.to});
    g.appendChild(svg("path",{d:geo.d,fill:"none",stroke:"transparent","stroke-width":"16"}));
    const p=svg("path",{class:"ln",d:geo.d,fill:"none",stroke:st.col,"stroke-width":st.w,"stroke-linecap":"round","stroke-linejoin":"round","marker-end":"url(#arrow)"});
    if(st.dash) p.setAttribute("stroke-dasharray",st.dash);
    if(st.op) p.setAttribute("stroke-opacity",st.op);
    g.appendChild(p);
    if(geo.dot) g.appendChild(svg("circle",{cx:geo.dot.x,cy:geo.dot.y,r:"3",fill:st.col}));
    if(r.kind==="x"){ const m=geo.mid, blk=(r.e.blocking||r.e.maxPriority==="p1");
      g.appendChild(svg("circle",{cx:m.x,cy:m.y,r:"8.5",fill:blk?"var(--blocking)":"var(--surface)",stroke:blk?"var(--surface)":"var(--border-strong)","stroke-width":blk?"1.6":"1",filter:"url(#nshadow)"}));
      const t=svg("text",{x:m.x,y:m.y+3.2,"text-anchor":"middle","font-size":"9.5","font-weight":"750","font-family":"var(--mono)",fill:blk?"#fff":"var(--text-dim)"});
      t.textContent=String(r.e.count||1); g.appendChild(t); }
    else if((r.e.drift||"current")!=="current"){ const m=geo.mid;
      g.appendChild(svg("circle",{cx:m.x,cy:m.y,r:"4.5",fill:DRIFT_COLOR[r.e.drift]||"var(--text-faint)",stroke:"var(--surface)","stroke-width":"1.6"})); }
    bindTip(g,r.kind==="c"?contractTip(r.e):exchangeTip(r.e));
    g.addEventListener("mouseenter",()=>focusEdge(g));

const SEVRANK={blocking:0,attention:1,normal:2}, PRIRANK={p1:0,p2:1,p3:2};
function inboxCard(items,o){
  const card=el("div",{class:"card"});
  const scopeKey=(o.inbound?"in":"out")+":"+S.mode+":"+S.activeSpace;
  const head=el("div",{class:"card-h"});
  head.appendChild(el("h2",{text:o.inbound?L.ui.inbox:L.ui.outbox}));
  const note=el("span",{class:"cnt-note"}); head.appendChild(note); head.appendChild(el("span",{class:"sp"}));
  card.appendChild(head);

  const types=[...new Set(items.map(i=>i.type))];
  let chipEls=[];
  if(o.inbound){
    const bar=el("div",{class:"filterbar"});
    const searchInput=el("input",{type:"text",placeholder:L.ui.filter,value:S.filterText});
    bar.appendChild(el("div",{class:"filterrow"},[el("div",{class:"search"},[searchIcon(),searchInput])]));
    const chips=el("div",{class:"filterrow"});
    const allChip=el("button",{class:"fchip"+(S.typeSel==null?" on":""),text:L.ui.all,onclick:()=>{ S.typeSel=null; refresh(); }});
    chips.appendChild(allChip); chipEls.push([allChip,null]);
    types.forEach(t=>{ const c=el("button",{class:"fchip"+(S.typeSel===t?" on":""),onclick:()=>{ S.typeSel=(S.typeSel===t?null:t); refresh(); }},
      [el("span",{class:"fdot",style:"background:"+TYPE_COLOR[t]}),document.createTextNode(typeWord(t))]); chips.appendChild(c); chipEls.push([c,t]); });
    bar.appendChild(chips); card.appendChild(bar);
    searchInput.addEventListener("input",e=>{ S.filterText=e.target.value; refresh(); });
  }
  const scroll=el("div",{class:"panelscroll"}); card.appendChild(scroll);

  function refresh(){
    chipEls.forEach(([c,t])=>c.classList.toggle("on", S.typeSel===t));
    const q=(S.filterText||"").toLowerCase().trim();
    let list=items.filter(i=>S.typeSel==null || i.type===S.typeSel);
    if(q) list=list.filter(i=>[safeTitle(i.title),i.from,(i.to||[]).join(" "),i.id,typeWord(i.type),stateWord(i.state)].join(" ").toLowerCase().includes(q));
    const total=items.length, blk=items.filter(i=>i.severity==="blocking").length;
    note.textContent = total+" "+(o.inbound?L.ui.open:L.ui.waiting)+(blk&&o.inbound?" · "+blk+" "+L.ui.blocking:"");
    scroll.textContent="";
    if(!items.length){ scroll.appendChild(emptyState(okIcon(),o.inbound?L.ui.inboxClearT:"—",o.inbound?L.ui.inboxClearD:"")); return; }
    if(!list.length){ scroll.appendChild(emptyState(searchBigIcon(),L.ui.noResultsT,L.ui.noResultsD)); return; }
    [["blocking"],["attention"],["normal"]].forEach(([sev])=>{
      const arr=list.filter(i=>i.severity===sev).sort((a,b)=>(PRIRANK[a.priority]??9)-(PRIRANK[b.priority]??9));
      if(!arr.length) return;
      const grp=el("div",{class:"grp "+sev});
      grp.appendChild(el("div",{class:"grp-h "+sev},[el("span",{class:"gdot"}),document.createTextNode(sevWord(sev)),el("span",{class:"gc",text:arr.length})]));
      const key=scopeKey+":"+sev, collapsible=sev==="normal"&&arr.length>4, expanded=S.expand.has(key);
      (collapsible&&!expanded?arr.slice(0,4):arr).forEach(it=>grp.appendChild(itemRow(it,o,refresh)));
      if(collapsible){ const hidden=arr.length-4;
        grp.appendChild(el("button",{class:"showmore",text:expanded?L.ui.showLess:L.ui.showMore(hidden),
          onclick:()=>{ if(expanded)S.expand.delete(key); else S.expand.add(key); refresh(); }})); }
      scroll.appendChild(grp);
    });
  }
  refresh();
  return card;
}

function healthCard(spaces){
  const card=el("div",{class:"card"});
  card.appendChild(el("div",{class:"card-h"},[el("h2",{text:L.ui.health}),el("span",{class:"sp"})]));
  spaces.forEach(sp=>{
    const cls=sp.readable===false?"degraded":(sp.stale?"stale":"fresh");
    const label=sp.readable===false?L.ui.unreadable:(sp.stale?L.ui.staleWord:L.ui.fresh);
    const row=el("div",{class:"hrow"});
    row.appendChild(el("span",{class:"hstat "+cls,title:label}));
    const m=el("div",{class:"hmain"});
    m.appendChild(el("div",{class:"hname",text:sp.id}));
    m.appendChild(el("div",{class:"hsub",title:sp.repoURL,text:sp.repoURL||"—"}));
    row.appendChild(m);
    row.appendChild(el("div",{class:"hage"},[
      el("div",{},[el("span",{class:"lab",text:L.ui.synced+" "}),document.createTextNode(sp.syncAge||"—")]),
      el("div",{},[el("span",{class:"lab",text:L.ui.members+" "}),document.createTextNode(String(sp.participantCount))])
    ]));
    card.appendChild(row);
  });
  return card;
}

/* ================================================================ FLAGS */
function flagsCard(flags,combined){
  const card=el("div",{class:"card"});
  card.appendChild(el("div",{class:"card-h"},[el("h2",{text:L.ui.flags}),el("span",{class:"cnt-note",text:String(flags.length)}),el("span",{class:"sp"})]));
  flags.forEach(f=>{
    const row=el("div",{class:"flag "+(f.severity||"normal")});
    row.appendChild(el("span",{class:"fc",text:f.code}));
    const m=el("div",{class:"fmsg"});
    m.appendChild(el("div",{text:safeTitle(f.message)}));
    m.appendChild(el("div",{class:"fmeta",text:f.system+(combined?" · "+f.space:"")}));
    row.appendChild(m); card.appendChild(row);
  });
  return card;
}

/* ================================================================ GUIDE */
function renderGuide(){
  const g=el("div",{class:"guide"}), GT=GUIDE_TEXT;
  /* hero */
  const hero=el("div",{class:"g-hero"});
  const hl=el("div",{class:"g-hleft"});
  hl.appendChild(el("div",{class:"eyebrow",text:L.guide.eyebrow}));
  hl.appendChild(el("h1",{text:L.guide.title}));
  const lead=el("p",{class:"g-lead"}); const parts=GT.lead[S.lang];
  const codeIdx=new Set([1,3,9]), strongIdx=new Set([5,7]);
  parts.forEach((p,i)=>{ lead.appendChild(codeIdx.has(i)?el("code",{text:p}):strongIdx.has(i)?el("strong",{text:p}):document.createTextNode(p)); });
  hl.appendChild(lead);
  const cr=el("div",{class:"g-ctarow"});
  cr.appendChild(el("button",{class:"gbtn primary",text:GT.cta.b1[S.lang],onclick:()=>go("docs")}));
  cr.appendChild(el("button",{class:"gbtn",text:GT.cta.b2[S.lang],onclick:()=>go("space")}));
  hl.appendChild(cr);
  hero.appendChild(hl);
  hero.appendChild(heroDiagram());
  g.appendChild(hero);

  /* three pillars of the model */
  const pills=el("div",{class:"g-pillars"});
  GT.pillars.forEach(p=>pills.appendChild(el("div",{class:"g-pillar"},[
    el("div",{class:"pt",text:p.t[S.lang]}),
    el("div",{class:"pd",text:p.d[S.lang]}),
    el("span",{class:"pm",text:p.m})])));
  g.appendChild(pills);

  /* automation band — built for agents (skill · cli · mcp · auto-merge) */
  const auto=el("div",{class:"g-auto"});
  auto.appendChild(el("div",{class:"g-ahead"},[
    el("div",{class:"eyebrow",text:(S.lang==="ru"?"Автоматизация":"Automation")}),
    el("h2",{text:L.guide.secAuto}),
    el("p",{text:L.guide.secAutoSub})]));
  const feats=el("div",{class:"g-feats"});
  GT.auto.forEach(f=>feats.appendChild(el("div",{class:"g-feat"},[
    el("span",{class:"g-ftag",text:f.tag}),
    el("div",{class:"g-ft",text:f.t[S.lang]}),
    el("div",{class:"g-fd",text:f.d[S.lang]})])));
  auto.appendChild(feats);
  g.appendChild(auto);

  /* 01 — artifact types */
  const s1=gsec("01",L.guide.secTypes,L.guide.secTypesSub);
  const cards=el("div",{class:"g-cards"});
  Object.keys(TYPE_PX).forEach(type=>{
    const c=el("div",{class:"g-card",style:"--gc:"+TYPE_COLOR[type]});
    c.appendChild(el("div",{class:"gwm",text:TYPE_PX[type]}));
    c.appendChild(el("div",{class:"gh"},[el("span",{class:"gpx",style:"background:"+TYPE_COLOR[type],text:TYPE_PX[type]}),el("span",{class:"gname",text:typeWord(type)})]));
    c.appendChild(el("div",{class:"gd",text:GT.artifacts[type][S.lang]}));
    cards.appendChild(c);
  });
  s1.appendChild(cards); g.appendChild(s1);

  /* 02 — lifecycle rail (boxed section) */
  const s2=gsec("02",L.guide.secLife,L.guide.secLifeSub); s2.classList.add("boxed");
  const rail=el("div",{class:"g-rail"});
  const order=["draft","submitted","acked","accepted","in-progress","responded","verified","closed"];
  order.forEach((k,i)=>rail.appendChild(el("div",{class:"g-rstep"},[
    el("div",{class:"rdot",text:String(i+1)}),
    el("div",{class:"rname",text:stateWord(k)}),
    el("div",{class:"rd",text:GT.lifecycle[k][S.lang]})])));
  s2.appendChild(rail);
  const br=el("div",{class:"g-branch"});
  br.appendChild(el("div",{class:"bline"}));
  br.appendChild(el("div",{class:"bbody"},[
    el("span",{class:"bdot",text:"!"}),
    el("div",{},[el("div",{class:"bname",text:stateWord("disputed")}),el("div",{class:"bd",text:GT.lifecycle.disputed[S.lang]})])]));
  s2.appendChild(br); g.appendChild(s2);

  /* 03 — flow pipeline (boxed; 4 equal phases, steps stacked) */
  const s3=gsec("03",L.guide.secFlow,L.guide.secFlowSub); s3.classList.add("boxed");
  const flow=el("div",{class:"g-flow"});
  const cuts=[[0,3],[3,5],[5,7],[7,9]];
  cuts.forEach((c,i)=>{
    const ph=el("div",{class:"g-phase"});
    ph.appendChild(el("div",{class:"plab"},[el("span",{class:"pn",text:String(i+1)}),document.createTextNode(GT.phases[i][S.lang])]));
    const rowsteps=GT.pipe.slice(c[0],c[1]);
    const row=el("div",{class:"psteps"});
    rowsteps.forEach((st,j)=>{
      row.appendChild(el("span",{class:"pstep"},[el("b",{text:st.cmd}), st[S.lang]?el("span",{text:st[S.lang]}):null]));
      if(j<rowsteps.length-1) row.appendChild(el("span",{class:"pconn"}));
    });
    ph.appendChild(row); flow.appendChild(ph);
  });
  s3.appendChild(flow); g.appendChild(s3);

  /* 04 — signals (real dashboard badges) */
  const s4=gsec("04",L.guide.secSig,L.guide.secSigSub);
  const sig=el("div",{class:"g-sig"});
  GT.signals.forEach(x=>sig.appendChild(el("div",{class:"g-sigrow"},[
    el("div",{class:"g-sigbadge"},[signalBadge(x.kind)]),
    el("div",{class:"g-sigtext"},[el("div",{class:"sb",text:x.b[S.lang]}),el("div",{class:"st",text:x.d[S.lang]})])])));
  s4.appendChild(sig); g.appendChild(s4);

  /* closing cta */
  const cta=el("div",{class:"g-cta"});
  cta.appendChild(el("div",{},[el("h2",{text:GT.cta.t[S.lang]}),el("p",{text:GT.cta.d[S.lang]})]));
  const cbt=el("div",{class:"g-ctarow"});
  cbt.appendChild(el("button",{class:"gbtn primary",text:GT.cta.b1[S.lang],onclick:()=>go("docs")}));
  cbt.appendChild(el("button",{class:"gbtn",text:GT.cta.b2[S.lang],onclick:()=>go("space")}));
  cta.appendChild(cbt); g.appendChild(cta);

  /* soft reveal on scroll */
  if("IntersectionObserver" in window && !matchMedia("(prefers-reduced-motion: reduce)").matches){
    const io=new IntersectionObserver(es=>es.forEach(e2=>{ if(e2.isIntersecting){ e2.target.classList.add("in"); io.unobserve(e2.target); } }),{threshold:0.1});
    [].slice.call(g.children).forEach((x,i)=>{ if(i===0) return; x.classList.add("g-rev"); io.observe(x); });
  }
  return g;
}
/* hero diagram: your real self + a real peer exchanging typed files through the space */
function heroDiagram(){
  const wrap=el("div",{class:"g-diag"});
  const s=svg("svg",{viewBox:"0 0 440 300",role:"img"});
  const defs=svg("defs");
  const f=svg("filter",{id:"gdsh",x:"-30%",y:"-60%",width:"160%",height:"220%"});
  f.appendChild(svg("feDropShadow",{dx:"0",dy:"1.5",stdDeviation:"2.4","flood-color":"#0b1220","flood-opacity":"0.10"}));
  defs.appendChild(f); defs.appendChild(arrowMarker()); s.appendChild(defs);
  s.appendChild(svg("rect",{x:161,y:36,width:118,height:230,rx:18,fill:"var(--accent-soft)",stroke:"var(--accent-ring)","stroke-width":"1.4","stroke-dasharray":"3 6",opacity:"0.85"}));
  const zl=svg("text",{x:220,y:60,"text-anchor":"middle","font-size":"11","font-weight":"750","font-family":"var(--mono)",fill:"var(--accent)"});
  zl.textContent=GUIDE_TEXT.diagram.space[S.lang]; s.appendChild(zl);
  function flowPath(d){ return svg("path",{class:"flow",d,fill:"none",stroke:"var(--accent)","stroke-width":"2","stroke-linecap":"round","stroke-dasharray":"0.1 6.9","marker-end":"url(#arrow)","stroke-opacity":"0.9"}); }
  s.appendChild(flowPath("M136 138 C 180 100, 260 100, 304 134"));
  s.appendChild(flowPath("M304 166 C 260 204, 180 204, 136 168"));
  function chip(cx,cy,px,pcol,label){
    const g2=svg("g");
    const w=54+label.length*6.4;
    g2.appendChild(svg("rect",{x:cx-w/2,y:cy-13,width:w,height:26,rx:13,fill:"var(--surface)",stroke:"var(--border-strong)","stroke-width":"1",filter:"url(#gdsh)"}));
    g2.appendChild(svg("rect",{x:cx-w/2+7,y:cy-8,width:26,height:16,rx:5,fill:pcol}));
    const pt=svg("text",{x:cx-w/2+20,y:cy+3.6,"text-anchor":"middle","font-size":"9","font-weight":"800","font-family":"var(--mono)",fill:"#fff"});
    pt.textContent=px; g2.appendChild(pt);
    const lt=svg("text",{x:cx-w/2+40,y:cy+3.6,"font-size":"10.5","font-weight":"650",fill:"var(--text)"});
    lt.textContent=label; g2.appendChild(lt);
    return g2;
  }
  s.appendChild(chip(220,98,"XQ",TYPE_COLOR.question,typeWord("question")));
  s.appendChild(chip(220,204,"XS",TYPE_COLOR.response,typeWord("response")));
  const prTxt=GUIDE_TEXT.diagram.pr[S.lang], prw=26+prTxt.length*6.2;
  s.appendChild(svg("rect",{x:220-prw/2,y:234,width:prw,height:20,rx:10,fill:"var(--surface-2)",stroke:"var(--border)"}));
  const prt=svg("text",{x:220,y:247.5,"text-anchor":"middle","font-size":"9.5","font-family":"var(--mono)",fill:"var(--text-dim)"});
  prt.textContent=prTxt; s.appendChild(prt);
  const egoNode=(DATA.nodes||[]).find(n=>n.self)||{system:DATA.self||"you",org:""};
  const peerNode=(DATA.nodes||[]).find(n=>!n.self&&n.status!=="left")||{system:"seomatrix",org:"—"};
  function sysCard(x,y,node,isYou){
    const g2=svg("g");
    g2.appendChild(svg("rect",{x,y,width:120,height:48,rx:12,fill:isYou?"var(--accent-soft)":"var(--surface)",stroke:isYou?"var(--accent)":"var(--border-strong)","stroke-width":isYou?"1.6":"1",filter:"url(#gdsh)"}));
    const t=svg("text",{x:x+14,y:y+21,"font-size":"13","font-weight":"720",fill:"var(--text)"});
    t.textContent=trunc(safeTitle(node.system),11); g2.appendChild(t);
    const o=svg("text",{x:x+14,y:y+36,"font-size":"9.5","font-family":"var(--mono)",fill:"var(--text-faint)"});
    o.textContent=trunc(node.org||"—",13); g2.appendChild(o);
    if(isYou){ g2.appendChild(svg("rect",{x:x+120-36,y:y+8,width:28,height:14,rx:7,fill:"var(--accent)"}));
      const yt=svg("text",{x:x+120-22,y:y+18,"text-anchor":"middle","font-size":"8","font-weight":"800","font-family":"var(--mono)",fill:"#fff"});
      yt.textContent=L.ui.you; g2.appendChild(yt); }
    return g2;
  }
  s.appendChild(sysCard(14,128,egoNode,true));
  s.appendChild(sysCard(306,128,peerNode,false));
  wrap.appendChild(s);
  return wrap;
}
function gsec(num,title,sub){ const s=el("div",{class:"g-sec"});
  const h=el("div",{class:"g-shead"}); h.appendChild(el("span",{class:"num",text:num})); h.appendChild(el("h2",{text:title})); if(sub)h.appendChild(el("p",{text:sub}));
  s.appendChild(h); return s; }
/* signalBadge: the REAL dashboard token for a signal, so the guide shows what
   each badge actually looks like on a row (not a generic dot). */
function signalBadge(kind){
  const w=el("span",{class:"g-sbwrap"});
  if(kind==="blocking"){ w.appendChild(el("span",{class:"sdot blocking"})); w.appendChild(el("span",{class:"sig-chip blk",text:sevWord("blocking")})); }
  else if(kind==="priority"){ w.appendChild(el("span",{class:"pri p1",text:"P1"})); w.appendChild(el("span",{class:"pri p2",text:"P2"})); }
  else if(kind==="new"){ w.appendChild(el("span",{class:"newdot"})); w.appendChild(el("span",{class:"sig-chip soft",text:L.ui.new||"new"})); }
  else if(kind==="gate"){ w.appendChild(el("span",{class:"sig-chip blk",text:(S.lang==="ru"?"ревью":"review")})); }
  else if(kind==="stale"){ w.appendChild(el("span",{class:"sig-age",text:"14d"})); }
  else if(kind==="drift"){ w.appendChild(el("span",{class:"drift-pill",style:"--dc:var(--d-behind)",text:driftWord("behind")})); w.appendChild(el("span",{class:"drift-pill",style:"--dc:var(--d-deprecated)",text:driftWord("deprecated")})); }
  return w;
}

/* ================================================================ DOCS */
const GROUP_ORDER=["Start","Concepts","Reference","Authoring","Help"];
const GROUP_L={ru:{Start:"Начало",Concepts:"Концепции",Reference:"Справочник",Authoring:"Создание",Help:"Помощь"}};
function groupLabel(g){ return (GROUP_L[S.lang]&&GROUP_L[S.lang][g])||g; }
function slugify(s){ return String(s).toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"")||"s"; }
function iconDocsBig(){ return svgIcon([["path",{d:"M6 3h8l4 4v14H6z"}],["path",{d:"M14 3v4h4"}]],{width:"22",height:"22"}); }
function renderDocs(){
  const wrap=el("div");
  const ph=el("div",{class:"page-h"}); const phLeft=el("div",{class:"ph-left"});
  phLeft.appendChild(el("h1",{text:L.ui.docs}));
  if(S.lang==="ru"){ const m=el("div",{class:"ph-meta"}); m.appendChild(el("span",{class:"ph-chip",text:"EN · "+L.ui.docsEnHint})); phLeft.appendChild(m); }
  ph.appendChild(phLeft); wrap.appendChild(ph);

  const docs=Array.isArray(DOCS)?DOCS:[];
  if(!docs.length){ wrap.appendChild(el("div",{class:"card"},[emptyState(iconDocsBig(),L.ui.docs,L.ui.docsEmpty)])); return wrap; }
  if(!docs.some(d=>d.id===S.docSection)) S.docSection=docs[0].id;

  const layout=el("div",{class:"docs"});
  const nav=el("div",{class:"docs-nav"});
  const searchWrap=el("div",{class:"search"},[searchIcon(),el("input",{type:"text",placeholder:L.ui.docsSearch,value:S.docQuery})]);
  const navList=el("div",{class:"docs-navlist"});
  nav.appendChild(searchWrap); nav.appendChild(navList);
  const body=el("div",{class:"docs-body"});
  const toc=el("div",{class:"docs-toc"});
  layout.appendChild(nav); layout.appendChild(body); layout.appendChild(toc);
  wrap.appendChild(layout);

  function buildNav(){
    navList.textContent="";
    const q=(S.docQuery||"").toLowerCase().trim();
    const groups={};
    docs.forEach(d=>{ if(q && !((d.title+" "+d.html).toLowerCase().includes(q))) return; (groups[d.group]=groups[d.group]||[]).push(d); });
    const order=GROUP_ORDER.filter(g=>groups[g]).concat(Object.keys(groups).filter(g=>!GROUP_ORDER.includes(g)));
    if(!order.length){ navList.appendChild(el("div",{class:"docs-nores",text:L.ui.docsNoResults})); return; }
    order.forEach(g=>{ navList.appendChild(el("div",{class:"docs-grp",text:groupLabel(g)}));
      groups[g].forEach(d=>navList.appendChild(el("button",{class:"docs-link"+(d.id===S.docSection?" active":""),text:d.title,onclick:()=>selectDoc(d.id)}))); });
  }
  function selectDoc(id){ S.docSection=id; try{history.replaceState(null,"","#"+id);}catch(e){} renderBody(); buildNav(); }
  function renderBody(){
    const d=docs.find(x=>x.id===S.docSection)||docs[0];
    body.textContent="";
    const article=el("article",{class:"doc-article"});
    article.innerHTML=d.html;   /* TRUSTED: DOCS[].html is our own rendered content (see brief §1) */
    body.appendChild(article); body.scrollTop=0;
    article.querySelectorAll("h2,h3").forEach(h=>{ if(!h.id) h.id=slugify(h.textContent); });
    article.querySelectorAll("pre").forEach(pre=>{
      const btn=el("button",{class:"copybtn",text:L.ui.copy,onclick:()=>{
        const code=pre.querySelector("code")||pre, txt=code.textContent;
        const done=()=>{ btn.textContent=L.ui.copied; setTimeout(()=>{btn.textContent=L.ui.copy;},1200); };
        if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(done,done);
        else { const t=document.createElement("textarea"); t.value=txt; document.body.appendChild(t); t.select(); try{document.execCommand("copy");}catch(e){} t.remove(); done(); }
      }});
      pre.appendChild(btn);
    });
    /* In-article anchor links: cross-section refs (rewritten by the doc
       assembler to #section-id) switch sections; same-page heading anchors
       scroll within the body. Anything else is left to default. */
    article.querySelectorAll('a[href^="#"]').forEach(a=>{
      a.addEventListener("click",ev=>{
        const id=(a.getAttribute("href")||"").slice(1); if(!id) return;
        if(docs.some(x=>x.id===id)){ ev.preventDefault(); selectDoc(id); return; }
        let t; try{ t=article.querySelector("#"+CSS.escape(id)); }catch(e){ t=null; }
        if(t){ ev.preventDefault(); body.scrollTop=Math.max(0,t.offsetTop-8); }
      });
    });
    buildToc(article);
  }
  function buildToc(article){
    toc.textContent="";
    const hs=[...article.querySelectorAll("h2,h3")];
    if(hs.length<2){ toc.style.display="none"; return; }
    toc.style.display="";
    toc.appendChild(el("div",{class:"toc-h",text:L.ui.onThisPage}));
    hs.forEach(h=>toc.appendChild(el("a",{class:"toc-link lvl-"+h.tagName.toLowerCase(),href:"#"+h.id,text:h.textContent,
      onclick:ev=>{ ev.preventDefault(); body.scrollTop=Math.max(0,h.offsetTop-8); }})));
  }
  searchWrap.querySelector("input").addEventListener("input",e=>{ S.docQuery=e.target.value; buildNav(); });
  buildNav(); renderBody();
  return wrap;
}

/* ================================================================ BOOT */
function setLang(lang){ S.lang=lang; L=I18N[lang]; localStorage.setItem("a2a-lang",lang);
  document.documentElement.setAttribute("lang",lang); render(); }
function boot(){
  applyTheme();
  document.documentElement.setAttribute("lang",S.lang);
  document.getElementById("themeBtn").addEventListener("click",()=>{ S.theme=theme()==="dark"?"light":"dark"; localStorage.setItem("a2a-theme",S.theme); applyTheme(); });
  matchMedia("(prefers-color-scheme: dark)").addEventListener("change",()=>{ if(!S.theme) applyTheme(); });
  document.querySelectorAll("#langSeg button").forEach(b=>b.addEventListener("click",()=>setLang(b.dataset.lang)));
  const spaces=DATA.spaces||[];
  if(!spaces.length && S.mode!=="guide") S.mode="guide";
  if(S.mode==="clusters") S.mode="unified";
  if(S.mode==="space"||!["unified","guide","docs"].includes(S.mode)){ S.mode="space"; S.activeSpace=spaces[0]?spaces[0].id:null; if(!S.activeSpace) S.mode="guide"; }
  try{ const h=(location.hash||"").slice(1); if(h && Array.isArray(DOCS) && DOCS.some(d=>d.id===h)){ S.mode="docs"; S.docSection=h; } }catch(e){}
  render();
}
document.addEventListener("DOMContentLoaded",boot);
