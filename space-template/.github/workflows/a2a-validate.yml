# V3 CI — the space's write-funnel gate (plan §4.2/§9, spec 09 T5).
#
# This workflow is a thin invocation of the pinned a2a binary — it never
# reimplements schema/referential/lifecycle/policy validation logic (D-011,
# owned by internal/validate, P3). The exact `a2a` verb/flags below are a
# BEHAVIOR CONTRACT placeholder: the real verb surface belongs to
# internal/cli (P6, a parallel wave of this same epic) and is reconciled at
# P10 integration — see this phase's Deviations note before wiring a real
# space repo from this template.
name: a2a-validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least-privilege (§10.5 CI credential row): contents:read to check out the
# repo; pull-requests:read so the V3 G1/G2 policy branch can query approving
# reviews via the host API (internal/validate + internal/host, P3/P5) for
# the PR this run is validating.
permissions:
  contents: read
  pull-requests: read

env:
  # The PINNED validator release — NEVER "latest" (spec 09 §8 AC row 7).
  # Bump this deliberately when the space is ready to move to a newer
  # a2a release; the write funnel's own min_binary_version pin (space.yaml)
  # is the separate, per-write staleness guard (D-013, CC-085).
  A2A_VALIDATOR_VERSION: "0.1.0"

jobs:
  # The job name below is the exact GitHub status-check context branch
  # protection binds to (§4.2's cited string; spec 09 AC row 6 asserts
  # byte-equality against this literal). A rename here silently defeats
  # AC-101.2 and the P11 branch-protection checklist — do not touch it
  # without updating BRANCH-PROTECTION.md in lockstep.
  a2a-validate:
    name: a2a-validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch pinned a2a-validate binary
        # Fetches the EXACT pinned ${{ env.A2A_VALIDATOR_VERSION }} release
        # from the (private) product repo via the read-only token stored as
        # the A2A_BINARY_FETCH_TOKEN repo secret (§10.5 CI credential row) —
        # never "latest". A missing/expired token fails this step loudly
        # (CI red) instead of silently skipping validation (spec 09 §6
        # "token missing/expired -> CI fails loudly").
        env:
          GH_TOKEN: ${{ secrets.A2A_BINARY_FETCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::A2A_BINARY_FETCH_TOKEN repo secret is not set — cannot fetch the pinned validator binary" >&2
            exit 1
          fi
          gh release download "v${A2A_VALIDATOR_VERSION}" \
            --repo ydnikolaev/a2ahub \
            --pattern 'a2a-linux-amd64' \
            --output ./a2a
          chmod +x ./a2a

      - name: Run V3 (changed files + diff-authz + fold integrity + supersession linearity + policy/5.4b)
        # Behavior contract (spec 09 T5): V2 (schema+referential+authz+
        # lifecycle) over this PR's changed files, plus diff-authz (changed
        # paths must be ⊆ the author's section, author = this PR's GitHub
        # login mapped via space.yaml), fold integrity, supersession
        # linearity, and policy (classification, gates, 5.4b compat). Emits
        # machine-readable pass/fail; a non-zero exit fails this job (and
        # therefore the required check).
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: ./a2a validate --ci --mode=v3-pr --base "$PR_BASE_SHA"

  # Flag-only per §5.5's V3 row: same engine, full repo, post-merge. Never a
  # required check (spec 09 §8 AC row 10) — deliberately named differently
  # from the job above so it can never collide with the a2a-validate
  # status-check context.
  a2a-postmerge-audit:
    name: a2a-postmerge-audit (flag-only, never a required check)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch pinned a2a-validate binary
        env:
          GH_TOKEN: ${{ secrets.A2A_BINARY_FETCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::A2A_BINARY_FETCH_TOKEN repo secret is not set — cannot fetch the pinned validator binary" >&2
            exit 1
          fi
          gh release download "v${A2A_VALIDATOR_VERSION}" \
            --repo ydnikolaev/a2ahub \
            --pattern 'a2a-linux-amd64' \
            --output ./a2a
          chmod +x ./a2a

      - name: Run V3 full-repo audit (never blocks — already merged)
        # Surfaces cross-PR races (CC-095) as an annotation/flag, never a
        # merge block (already merged). continue-on-error keeps this run's
        # own conclusion from ever becoming a gate.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./a2a validate --ci --mode=v3-full-repo
